<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A clean 156-card tarot draw board: every card upright and reversed." />
  <meta name="theme-color" content="#111111" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Jost:wght@400;500;700&display=swap" rel="stylesheet" />
  <title>tarot-156</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #111110;
      --panel: #1a1917;
      --line: rgba(255, 255, 255, 0.1);
      --text: #f1eee8;
      --muted: rgba(241, 238, 232, 0.52);
      --faint: rgba(241, 238, 232, 0.2);
      --major: #8f86e8;
      --wands: #e59b2a;
      --cups: #3989d8;
      --swords: #249a74;
      --pentacles: #76a344;
      --rx: #e59b2a;
      --focus: #f1d36f;
      --font-sans: "Jost", system-ui, sans-serif;
      --font-mono: "DM Mono", "Courier New", monospace;
      color-scheme: dark light;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f2ee;
        --panel: #ffffff;
        --line: rgba(0, 0, 0, 0.12);
        --text: #191815;
        --muted: rgba(25, 24, 21, 0.58);
        --faint: rgba(25, 24, 21, 0.22);
        --focus: #866111;
      }
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 28px 16px 36px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.4;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(100%, 560px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .count,
    .orientation,
    .log-label,
    .log-number,
    .log-orientation,
    .log-limit {
      font-family: var(--font-mono);
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .current {
      min-height: 86px;
      display: grid;
      place-items: center;
      gap: 5px;
      padding: 18px 16px;
      margin-bottom: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: 2px solid var(--line);
      border-radius: 8px;
      text-align: center;
    }

    .empty {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .card-name {
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .orientation {
      font-size: 11px;
      letter-spacing: 0.07em;
      line-height: 1.3;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(13, 24px);
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
    }

    .slot {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
    }

    .dot {
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      display: block;
      padding: 0;
      margin: 0;
      border: 0;
      border-radius: 50%;
      appearance: none;
      background: var(--faint);
      cursor: pointer;
      line-height: 0;
      transform: translateZ(0);
      transition: background 140ms ease, opacity 140ms ease, transform 140ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .dot:hover:not(:disabled) {
      opacity: 0.72;
      transform: scale(1.08);
    }

    .dot:disabled {
      cursor: default;
      opacity: 1;
      transform: scale(0.78);
    }

    .dot:focus-visible,
    .action-button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .action-button {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 11px 6px 10px;
      color: var(--muted);
      background: transparent;
      border: 0.5px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1;
      appearance: none;
      -webkit-font-smoothing: antialiased;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 80ms ease;
    }

    .action-button:hover:not(:disabled) {
      opacity: 0.7;
    }

    .action-button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .action-button:disabled {
      cursor: default;
      opacity: 0.34;
    }

    .button-icon {
      width: 13px;
      height: 13px;
      display: block;
      flex: 0 0 auto;
    }

    .log-section {
      display: none;
      margin-top: 28px;
    }

    .log-label {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .log {
      display: grid;
      gap: 6px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 42px;
      align-items: start;
      gap: 10px;
      min-height: 48px;
      padding: 9px 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 3px solid var(--line);
      border-radius: 7px;
    }

    .log-number {
      color: var(--muted);
      font-size: 10px;
      padding-top: 2px;
    }

    .log-body {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .log-name {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.2;
    }

    .log-meaning {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .log-orientation {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-align: right;
      white-space: nowrap;
      padding-top: 2px;
    }

    .log-limit {
      display: none;
      margin-top: 10px;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
    }

    @media (max-width: 430px) {
      body {
        padding-top: 22px;
      }

      main {
        width: min(100%, 352px);
      }

      .board {
        grid-template-columns: repeat(11, 24px);
        gap: 8px;
      }
    }

    @media (max-width: 330px) {
      .board {
        grid-template-columns: repeat(10, 24px);
        gap: 7px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>tarot-156</h1>
      <div class="count" id="count">0 / 156</div>
    </div>

    <section class="current" id="current" aria-live="polite">
      <div class="empty">draw</div>
    </section>

    <div class="board" id="board" aria-label="Tarot cards"></div>

    <div class="controls">
      <button class="action-button reset" type="button" id="reset" aria-label="Reshuffle deck">
        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M12.5 4.9A5 5 0 1 0 13 9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          <path d="M12.8 2.2v3.2H9.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>reshuffle</span>
      </button>
      <button class="action-button copy" type="button" id="copy" aria-label="Copy pulled card names" disabled>
        <svg class="button-icon" viewBox="0 0 16 16" aria-hidden="true">
          <rect x="5" y="4" width="8" height="10" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.4" />
          <path d="M3 11V3.2C3 2.5 3.5 2 4.2 2H10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        <span id="copyText">copy</span>
      </button>
    </div>

    <section class="log-section" id="logSection" aria-label="Pulled cards">
      <div class="log-label">pulled cards</div>
      <div class="log" id="log"></div>
      <div class="log-limit" id="logLimit">all 156 cards drawn</div>
    </section>
  </main>

    const CARD_MEANINGS = {

      },
      "The Magician": {

      "4 of Pentacles": {

      "5 of Wands": {
        up: "Competition, conflict, and people clashing for position.",

    const BASE_CARDS = [
      ...MAJORS.map((name) => ({ name, suit: "major" })),
      ...RANKS.flatMap((rank) => SUITS.map((suit) => ({
        name: rank + " of " + suit,
        suit: suit.toLowerCase()
      })))
    ];

    const FULL_DECK = BASE_CARDS.flatMap((card) => [
      { ...card, reversed: false, meaning: CARD_MEANINGS[card.name].up },
      { ...card, reversed: true, meaning: CARD_MEANINGS[card.name].rx }
    ]);

    const state = {
      drawn: 0,
      logged: 0,
      results: []
    };

    let copyResetTimer = 0;

    const MAX_LOGGED_CARDS = FULL_DECK.length;

    const el = {
      board: document.getElementById("board"),
      count: document.getElementById("count"),
      current: document.getElementById("current"),
      copy: document.getElementById("copy"),
      copyText: document.getElementById("copyText"),
      log: document.getElementById("log"),
      logLimit: document.getElementById("logLimit"),
      logSection: document.getElementById("logSection"),
      reset: document.getElementById("reset")
    };

    function shuffle(cards) {
      const next = [...cards];

      for (let index = next.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [next[index], next[randomIndex]] = [next[randomIndex], next[index]];
      }

      return next;
    }

    function setCount() {
      el.count.textContent = state.drawn + " / 156";
    }

    function setCopyState(label) {
      el.copy.disabled = state.results.length === 0;
      el.copyText.textContent = label || "copy";
    }

    function clearCurrent() {
      el.current.style.borderTopColor = "var(--line)";
      el.current.replaceChildren(textNode("div", "empty", "draw"));
    }

    function textNode(tag, className, text) {
      const node = document.createElement(tag);
      node.className = className;
      node.textContent = text;
      return node;
    }

    function displayName(card) {
      return card.name.replace(/^The /, "");
    }

    function copyLine(card) {
      const suffix = card.reversed ? " rx" : "";
      return displayName(card).toLowerCase() + suffix;
    }

    function showCurrent(card, color) {
      const name = textNode("div", "card-name", displayName(card));
      const orientation = textNode("div", "orientation", card.reversed ? "reversed" : "upright");

      orientation.style.color = card.reversed ? COLORS.reversed : color;
      el.current.style.borderTopColor = color;
      el.current.replaceChildren(name, orientation);
    }

    function addToLog(card, color) {
      if (state.logged === MAX_LOGGED_CARDS) {
        return;
      }

      state.logged += 1;
      el.logSection.style.display = "block";

      const row = document.createElement("div");
      row.className = "log-row";
      row.style.borderLeftColor = color;

      const number = textNode("div", "log-number", String(state.logged));
      const body = document.createElement("div");
      body.className = "log-body";
      const name = textNode("div", "log-name", displayName(card));
      const meaning = textNode("div", "log-meaning", card.meaning);
      const orientation = textNode("div", "log-orientation", card.reversed ? "rx" : "up");
      orientation.style.color = card.reversed ? COLORS.reversed : color;

      body.append(name, meaning);
      row.append(number, body, orientation);
      el.log.appendChild(row);

      if (state.logged === MAX_LOGGED_CARDS) {
        el.logLimit.style.display = "block";
      }
    }

    function draw(card, dot) {
      if (dot.disabled) {
        return;
      }

      const color = COLORS[card.suit];
      const name = displayName(card);

      dot.disabled = true;
      dot.style.backgroundColor = color;
      dot.setAttribute("aria-label", name + ", " + (card.reversed ? "reversed" : "upright") + ", drawn");

      state.drawn += 1;
      state.results.push(card);
      setCount();
      setCopyState();
      showCurrent(card, color);
      addToLog(card, color);
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      const copied = document.execCommand("copy");
      textarea.remove();
      return copied;
    }

    async function copyResults() {
      if (state.results.length === 0) {
        return;
      }

      const text = state.results.map(copyLine).join("\n");
      let copied = false;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          copied = true;
        } else {
          copied = fallbackCopy(text);
        }
      } catch (error) {
        copied = fallbackCopy(text);
      }

      window.clearTimeout(copyResetTimer);
      setCopyState(copied ? "copied" : "copy failed");
      copyResetTimer = window.setTimeout(() => setCopyState(), 1200);
    }

    function init() {
      state.drawn = 0;
      state.logged = 0;
      state.results = [];
      setCount();
      setCopyState();
      clearCurrent();

      el.board.replaceChildren();
      el.log.replaceChildren();
      el.logLimit.style.display = "none";
      el.logSection.style.display = "none";

      shuffle(FULL_DECK).forEach((card, index) => {
        const slot = document.createElement("div");
        slot.className = "slot";

        const dot = document.createElement("button");
        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", "Draw card " + (index + 1));
        dot.addEventListener("click", () => draw(card, dot));

        slot.appendChild(dot);
        el.board.appendChild(slot);
      });
    }

    el.reset.addEventListener("click", init);
    el.copy.addEventListener("click", copyResults);
    init();
  </script>
</body>
</html>
