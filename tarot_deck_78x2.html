<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>78 Tarot Deck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --border: rgba(255,255,255,0.1);
      --text: #f0ede8;
      --text-muted: rgba(240,237,232,0.4);
      --text-dim: rgba(240,237,232,0.18);
      --radius: 10px;
      --font-mono: 'DM Mono', 'Courier New', monospace;
      --font-sans: 'Jost', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f4f0;
        --bg2: #ececea;
        --border: rgba(0,0,0,0.1);
        --text: #1a1a1a;
        --text-muted: rgba(26,26,26,0.45);
        --text-dim: rgba(26,26,26,0.18);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
      max-width: 640px;
      margin: 0 auto;
    }

    #current {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-top 0.2s;
    }

    .card-name {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .orientation {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.07em;
    }

    .prompt {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 7px;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 0;
    }

    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text-dim);
      cursor: pointer;
      transition: opacity 0.12s, background 0.18s, transform 0.15s;
      flex-shrink: 0;
    }

    .dot:hover:not([data-r]) { opacity: 0.6; }
    .dot[data-r] { cursor: default; transform: scale(0.75); }

    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    #count {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    button {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    button:hover { opacity: 0.7; }
    button:active { transform: scale(0.97); }

    #log-section {
      margin-top: 28px;
      display: none;
    }

    #log-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #log {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-left-width: 2px;
      border-radius: 8px;
      animation: fadein 0.18s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-num {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      min-width: 16px;
    }

    .log-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .log-or {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
    }

    #log-cap {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      text-align: center;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="current">
    <span class="prompt">tap a dot — pull a card</span>
  </div>

  <div id="grid"></div>

  <div id="footer">
    <span id="count">0 / 156 drawn</span>
    <button onclick="init()">reshuffle ↺</button>
  </div>

  <div id="log-section">
    <div id="log-label">pulled cards</div>
    <div id="log"></div>
    <div id="log-cap">21 card limit reached</div>
  </div>

  <script>
    const CARDS = [
      ...['The Fool','The Magician','The High Priestess','The Empress','The Emperor',
          'The Hierophant','The Lovers','The Chariot','Strength','The Hermit',
          'Wheel of Fortune','Justice','The Hanged Man','Death','Temperance',
          'The Devil','The Tower','The Star','The Moon','The Sun',
          'Judgement','The World'].map(n => ({ name: n, suit: 'major' })),
      ...['Ace','2','3','4','5','6','7','8','9','10','Page','Knight','Queen','King']
        .flatMap(n => [
          { name: n + ' of Wands',     suit: 'wands'     },
          { name: n + ' of Cups',      suit: 'cups'      },
          { name: n + ' of Swords',    suit: 'swords'    },
          { name: n + ' of Pentacles', suit: 'pentacles' },
        ])
    ];

    const DECK_BASE = CARDS.flatMap(c => [
      { ...c, rx: false },
      { ...c, rx: true  },
    ]);

    const SC = {
      major:     '#7F77DD',
      wands:     '#EF9F27',
      cups:      '#378ADD',
      swords:    '#1D9E75',
      pentacles: '#639922',
    };

    let drawn = 0;
    let logCount = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      drawn = 0;
      logCount = 0;

      document.getElementById('count').textContent = '0 / 156 drawn';

      const cur = document.getElementById('current');
      cur.style.borderTop = '0.5px solid var(--border)';
      cur.innerHTML = '<span class="prompt">tap a dot — pull a card</span>';

      document.getElementById('log-section').style.display = 'none';
      document.getElementById('log').innerHTML = '';
      document.getElementById('log-cap').style.display = 'none';

      const deck = shuffle(DECK_BASE);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      deck.forEach(card => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const dot = document.createElement('div');
        dot.className = 'dot';

        dot.onclick = () => {
          if (dot.dataset.r) return;
          dot.dataset.r = '1';
          drawn++;

          const color = SC[card.suit];
          dot.style.background = color;
          dot.style.opacity = '1';

          document.getElementById('count').textContent = drawn + ' / 156 drawn';

          const cur = document.getElementById('current');
          cur.style.borderTop = '2px solid ' + color;
          cur.innerHTML = `
            <span class="card-name">${card.name}</span>
            <span class="orientation" style="color:${card.rx ? '#EF9F27' : color};">
              ${card.rx ? '▽ reversed' : '△ upright'}
            </span>
          `;

          if (logCount < 21) {
            logCount++;
            document.getElementById('log-section').style.display = 'block';

            const row = document.createElement('div');
            row.className = 'log-row';
            row.style.borderLeftColor = color;
            row.innerHTML = `
              <span class="log-num">${logCount}</span>
              <span class="log-name">${card.name}</span>
              <span class="log-or" style="color:${card.rx ? '#EF9F27' : color};">${card.rx ? '▽ rx' : '△ up'}</span>
            `;
            document.getElementById('log').appendChild(row);

            if (logCount === 21) {
              document.getElementById('log-cap').style.display = 'block';
            }
          }
        };

        cell.appendChild(dot);
        grid.appendChild(cell);
      });
    }

    init();
  </script>

</body>
</html>
